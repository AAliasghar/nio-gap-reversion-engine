
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'nio_strategies'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'nio_strategies'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# You can define variables that will be passed into your dbt models and macros here. This is useful for things like environment-specific configurations or parameters that you want to easily change without modifying your SQL code. For example, you could define a variable for the number of days to look back in a model that calculates moving averages:
models:
  nio_strategies:
    # This ensures dbt builds your views in the 'nio_strategy' schema
    +schema: nio_strategy 
    +materialized: view

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

